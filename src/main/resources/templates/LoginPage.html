<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户信息表单</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
        input, select, textarea { padding: 5px; width: 200px; }
        .error { color: red; font-size: 12px; }
        .submit-btn { 
            background-color: #4CAF50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
        }
    </style>
</head>

<body>
    <h2>登入</h2>
    
    <form th:action="@{/submit}" th:object="${userForm}" method="post">
        <div class="form-group">
            <label for="name">账号:</label>
            <input type="text" id="name" th:field="*{userid}" required>
        </div>
        
        <div class="form-group">
            <label for="interests">密码:</label>
            <input id="interests" th:field="*{password}" required>
        </div>
        
        <div class="form-group">
            <input type="submit" value="提交" class="submit-btn">
        </div>
    </form>
</body>
</html>
